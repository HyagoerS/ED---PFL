<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for=""></label>
    <input type="text" id="idade">
    <button onclick="acessarServidor()" > Enter </button>
        <script>
            function acessarServidor(){
                const dado = document.getElementById("dado").value
                const servidor = "http://localhost:3000/hello/" + dado
                fetch(servidor).then(async (resposta)=>{
                    if(resposta.ok){
                        const json = await resposta.json()
                        console.log(json)
                    }
                    console.log("Deu certo!")
                }).catch((error)=>{
                    console.log("Deu errado!")
                }).finally(()=>{
                    console.log("fim")
                })
            }
        </script>

</body>
</html>
