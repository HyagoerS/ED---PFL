<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="acessarServidor()" >
        <script>

            function acessarServidor(){
                const servidor = "http://localhost:3000/hello"
                fetch(servidor).then(async (resposta)=>{
                    if(resposta.ok){
                        const json = await resposta.json()
                        console.log(json)
                    }
                    console.log("Deu certo!")
                }).catch((error)=>{
                    console.log("Deu errado!")
                }).finally(()=>{
                    console.log("fim")
                })
            }

        </script>
    </button>
</body>
</html>
